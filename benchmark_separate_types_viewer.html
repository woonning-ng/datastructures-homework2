<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Separate Benchmark Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 24px; background: #f7f7f9; color: #1f2937; }
    .card { background: white; border-radius: 14px; padding: 18px 20px; box-shadow: 0 4px 14px rgba(0,0,0,0.08); margin-bottom: 18px; }
    .chart { width: 100%; height: 460px; }
    h1,h2 { margin-bottom: 0.4rem; }
    .muted { color: #6b7280; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 14px; }
    th, td { border: 1px solid #e5e7eb; padding: 8px 10px; text-align: left; }
    th { background: #f3f4f6; }
    .section-title { margin: 0 0 0.5rem 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Benchmark Viewer</h1>
    <div class="muted">Loads separate graphs for each test-case family.</div>
    <input id="fileInput" type="file" accept=".json,application/json" />
  </div>

  <div id="charts"></div>

  <div class="card">
    <h2>Raw benchmark rows</h2>
    <div id="meta" class="muted"></div>
    <table id="resultsTable"></table>
  </div>

<script>
function renderChart(containerId, config) {
  const traces = (config.series || []).map((s) => ({
    x: s.x,
    y: s.y,
    text: s.text || [],
    type: "scatter",
    mode: "lines+markers",
    name: s.name
  }));
  Plotly.newPlot(containerId, traces, {
    margin: { t: 18, r: 20, b: 60, l: 70 },
    xaxis: { title: config.x_label },
    yaxis: { title: config.y_label },
    hovermode: "closest"
  }, {responsive: true});
}

function renderTable(rows) {
  const table = document.getElementById("resultsTable");
  if (!rows.length) {
    table.innerHTML = "<tr><td>No rows found.</td></tr>";
    return;
  }
  const headers = Object.keys(rows[0]);
  let html = "<thead><tr>" + headers.map(h => `<th>${h}</th>`).join("") + "</tr></thead><tbody>";
  html += rows.map(row => "<tr>" + headers.map(h => `<td>${row[h] ?? ""}</td>`).join("") + "</tr>").join("");
  html += "</tbody>";
  table.innerHTML = html;
}

function render(payload) {
  const chartsDiv = document.getElementById("charts");
  chartsDiv.innerHTML = "";
  const chartEntries = Object.entries(payload.charts || {});
  chartEntries.forEach(([key, config]) => {
    const card = document.createElement("div");
    card.className = "card";
    const title = document.createElement("h2");
    title.className = "section-title";
    title.textContent = config.title || key;
    const chart = document.createElement("div");
    chart.id = "chart_" + key;
    chart.className = "chart";
    card.appendChild(title);
    card.appendChild(chart);
    chartsDiv.appendChild(card);
    renderChart(chart.id, config);
  });

  renderTable(payload.rows || []);
  const meta = payload.meta || {};
  document.getElementById("meta").textContent =
    `Executable: ${meta.executable || ""} | Repeats: ${meta.repeats || ""} | Scaling ratio: ${meta.scaling_ratio || ""}`;
}

document.getElementById("fileInput").addEventListener("change", async (event) => {
  const file = event.target.files[0];
  if (!file) return;
  const text = await file.text();
  render(JSON.parse(text));
});
</script>
</body>
</html>
