<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Polygon Simplification Benchmark</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 24px;
      line-height: 1.45;
      background: #f7f7f9;
      color: #1f2937;
    }
    h1, h2 { margin-bottom: 0.35rem; }
    .card {
      background: white;
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }
    .chart { width: 100%; height: 460px; }
    input[type="file"] { margin-top: 8px; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 14px;
      background: white;
    }
    th, td {
      border: 1px solid #e5e7eb;
      padding: 8px 10px;
      text-align: left;
    }
    th { background: #f3f4f6; }
    .muted { color: #6b7280; }
    code { background: #eef2ff; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Polygon Simplification Benchmark Viewer</h1>
    <div class="muted">
      Load the <code>benchmark_results.json</code> file produced by the Python benchmark script.
    </div>
    <input id="fileInput" type="file" accept=".json,application/json" />
  </div>

  <div class="card">
    <h2>Running time vs input size</h2>
    <div id="runtimeChart" class="chart"></div>
  </div>

  <div class="card">
    <h2>Peak memory usage vs input size</h2>
    <div id="memoryChart" class="chart"></div>
  </div>

  <div class="card">
    <h2>Areal displacement vs target vertex count</h2>
    <div id="displacementChart" class="chart"></div>
  </div>

  <div class="card">
    <h2>Raw benchmark rows</h2>
    <div id="meta" class="muted"></div>
    <table id="resultsTable"></table>
  </div>

  <script>
    function renderLineChart(containerId, config) {
      const traces = (config.series || []).map((s) => ({
        x: s.x,
        y: s.y,
        text: s.text || [],
        type: "scatter",
        mode: "lines+markers",
        name: s.name
      }));

      Plotly.newPlot(containerId, traces, {
        margin: { t: 18, r: 20, b: 60, l: 70 },
        xaxis: { title: config.x_label },
        yaxis: { title: config.y_label },
        hovermode: "closest"
      }, {responsive: true});
    }

    function renderTable(rows) {
      const table = document.getElementById("resultsTable");
      if (!rows.length) {
        table.innerHTML = "<tr><td>No rows found.</td></tr>";
        return;
      }
      const headers = Object.keys(rows[0]);
      let html = "<thead><tr>" + headers.map(h => `<th>${h}</th>`).join("") + "</tr></thead><tbody>";
      html += rows.map(row =>
        "<tr>" + headers.map(h => `<td>${row[h] ?? ""}</td>`).join("") + "</tr>"
      ).join("");
      html += "</tbody>";
      table.innerHTML = html;
    }

    function render(payload) {
      renderLineChart("runtimeChart", payload.charts.runtime_vs_input);
      renderLineChart("memoryChart", payload.charts.memory_vs_input);
      renderLineChart("displacementChart", payload.charts.areal_displacement_vs_target);
      renderTable(payload.rows || []);
      const meta = payload.meta || {};
      document.getElementById("meta").textContent =
        `Executable: ${meta.executable || ""} | Repeats: ${meta.repeats || ""}`;
    }

    document.getElementById("fileInput").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const text = await file.text();
      const payload = JSON.parse(text);
      render(payload);
    });
  </script>
</body>
</html>
